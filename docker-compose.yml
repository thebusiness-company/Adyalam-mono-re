services:
  db:
    image: postgres:15-alpine
    container_name: adyalam-db
    restart: always
    environment:
      POSTGRES_DB: adyalam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adyalam"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-adyalam}/adyalam-backend:latest
    container_name: adyalam-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/adyalam
    volumes:
      - uploads_data:/app/static/uploads
    ports:
      - "127.0.0.1:8005:8000"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-adyalam}/adyalam-frontend:latest
    container_name: adyalam-frontend
    restart: always
    ports:
      - "127.0.0.1:5177:80"

volumes:
  postgres_data:
  uploads_data: