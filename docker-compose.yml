services:

  db:
    image: postgres:15-alpine
    container_name: adyalam-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: adyalam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "127.0.0.1:5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adyalam"]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/adyalam-backend:latest

    container_name: adyalam-backend

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/adyalam

    volumes:
      - uploads_data:/app/static/uploads

    ports:
      - "127.0.0.1:8005:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/adyalam-frontend:latest

    container_name: adyalam-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_started

    ports:
      - "127.0.0.1:5177:80"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  uploads_data: