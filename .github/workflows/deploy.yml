name: CI/CD Production Deployment to AWS EC2

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/adyalam-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/adyalam-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert image names to lowercase
        run: |
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/$(echo '${{ env.BACKEND_IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ env.REGISTRY }}/$(echo '${{ env.FRONTEND_IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          sbom: false
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2

    runs-on: ubuntu-latest

    timeout-minutes: 20

    needs:
      - build-and-push

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            mkdir -p ~/adyalam

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: docker-compose.yml
          target: ~/adyalam/

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |

            set -e

            cd ~/adyalam

            docker compose version

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
              -u "${{ github.repository_owner }}" \
              --password-stdin

            cat > .env <<EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            EOF

            docker compose pull

            docker compose up -d --remove-orphans

            docker compose ps

            echo "Waiting for backend..."

            sleep 20

            curl -f http://127.0.0.1:8005/health

            echo "Deployment Successful"

            docker image prune -f

      - name: Show container logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/adyalam

            docker compose ps

            docker compose logs backend --tail=100

            docker compose logs frontend --tail=100

            docker compose logs db --tail=100